
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>One Last Message ❤️</title>
<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(#050816,#111827);
color:#fff;
overflow-x:hidden;
text-align:center;
}
#stars{
position:fixed;inset:0;z-index:-2;
background:
radial-gradient(circle,#fff 1px,transparent 2px) 10% 20%/180px 180px,
radial-gradient(circle,#fff 1px,transparent 2px) 70% 35%/220px 220px,
radial-gradient(circle,#fff 1px,transparent 2px) 40% 80%/200px 200px;
animation:twinkle 3s infinite alternate;
}
@keyframes twinkle{from{opacity:.4}to{opacity:1}}
.card{
max-width:700px;
margin:30px auto;
padding:25px;
background:rgba(255,255,255,.08);
border-radius:22px;
backdrop-filter:blur(8px);
}
#msg{font-size:22px;line-height:1.8}
button{
padding:15px 28px;
border:none;
border-radius:30px;
background:#ff4d6d;
color:#fff;
font-size:18px;
cursor:pointer;
margin:20px 0;
}
video{
display:none;
width:100%;
height:auto;
max-height:75vh;
object-fit:contain;
background:#000;
border-radius:20px;
box-shadow:0 0 35px rgba(255,77,109,.6);
animation:glow 2s infinite alternate;
}
@keyframes glow{
from{box-shadow:0 0 15px rgba(255,77,109,.3);}
to{box-shadow:0 0 40px rgba(255,77,109,.9);}
}
#end{display:none;margin-top:25px;line-height:1.8}
.heart{
position:fixed;
bottom:-40px;
font-size:22px;
animation:floatUp linear forwards;
pointer-events:none;
}
@keyframes floatUp{
from{transform:translateY(0);opacity:0}
20%{opacity:1}
to{transform:translateY(-110vh);opacity:0}
}
#fadeScreen{
position:fixed;
inset:0;
background:#000;
opacity:0;
pointer-events:none;
transition:opacity 4s ease;
z-index:9999;
}
#fadeScreen.show{opacity:1}
</style>
</head>
<body>

<div id="stars"></div>

<div class="card">
<h1>❤️ One Last Message ❤️</h1>
<p id="msg"></p>

<button id="playBtn" onclick="playVideo()">▶️ Play Dudu's Message ❤️</button>

<video id="vid" controls playsinline>
<source src="finalmessage.mp4" type="video/mp4">
</video>

<div id="end">
<h2>Happy Birthday, My Beautiful Bubu ❤️</h2>
<p>
I hope today made Bubu smile. ❤️<br><br>
Thank you for every memory, every laugh and every moment.<br><br>
I love you so much.
</p>

<h2>✨ This isn't the end... ✨</h2>
<p>It's just the beginning of many more birthdays together. ❤️</p>
</div>
</div>

<div id="fadeScreen"></div>

<script>
const t="Before you press play...\n\nThis is the only surprise today that can't be wrapped, hidden, or delivered.\n\nIt's simply my heart. ❤️";
let i=0;
function type(){
 if(i<t.length){
   msg.innerHTML+=t[i]=="\n"?"<br>":t[i];
   i++;
   setTimeout(type,40);
 }
}
type();

setInterval(()=>{
 const h=document.createElement("div");
 h.className="heart";
 h.innerHTML="❤️";
 h.style.left=Math.random()*100+"vw";
 h.style.animationDuration=(5+Math.random()*5)+"s";
 document.body.appendChild(h);
 setTimeout(()=>h.remove(),10000);
},600);

function playVideo(){
 document.getElementById("playBtn").style.display="none";
 const v=document.getElementById("vid");
 v.style.display="block";
 v.play();

 v.onended=function(){
   document.getElementById("end").style.display="block";
   window.scrollTo({top:document.body.scrollHeight,behavior:"smooth"});

   setTimeout(()=>{
      document.getElementById("fadeScreen").classList.add("show");
   },9000);

   setTimeout(()=>{
      document.body.innerHTML='<div style="height:100vh;background:#000;color:#fff;display:flex;justify-content:center;align-items:center;font-family:Arial;text-align:center;padding:20px;font-size:32px;line-height:1.8;">❤️ Happy Birthday, Bubu ❤️<br><br>Forever Yours...<br><b>Dudu ❤️</b></div>';
   },13000);
 }
}
</script>

</body>
</html>
